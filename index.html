<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- <link rel="stylesheet" href="/css/main.css"> -->
   <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Chicken Farm</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: visible;
  font-family: 'Lato', sans-serif;
}
/* ── Main game container (9:16) ── */
#game {
  position: relative;
  aspect-ratio: 9 / 16;
  height: 100vh;
  max-height: 100vh;
  max-width: calc(100vh * 9 / 16);
  overflow: visible;
  user-select: none;
}
/* ── Background ── */
.bg {
  position: absolute;
  inset: 0;
  background: url('assets/img/background.png') center / cover no-repeat;
  z-index: 0;
}
/* ── TOP BAR ── */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 2% 3%;
  border: 1px solid red;
}
/* Bag of feed counter (top-left) */
.feed-counter {
  background: url('assets/img/background of food.png') center / 100% 100% no-repeat;
  width: 16%;
  aspect-ratio: 174/103;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6%;
}
.feed-counter img.feed-icon {
  width: 35%;
}
.feed-counter .feed-num {
  font-size: 2vh;
  font-weight: 600;
  color: #000000;
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
}
/* Center cluster: +, chickens, rooster, egg */
.center-stats {
  display: flex;
  align-items: center;
  gap: 1.5%;
}
.btn-add-chicken {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-add-chicken img {
  width: 4.5vw;
  max-width: 28px;
}
.stat-pill {
  border-radius: 9px;
  display: flex;
  align-items: center;
  gap: 4%;
  padding: 1% 6%;
  font-size: 1.7vh;
  font-weight: 900;
  color: #5a3210;
  overflow: visible;
}
.stat-pill img {
  height: 2.2vh;
  overflow: visible;
}
/* Day counter (top-right) */
.day-counter {
  background: url('assets/img/background of day.png') center / 100% 100% no-repeat;
  width: 18%;
  aspect-ratio: 174/103;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.1;
}
.day-counter .day-label {
  font-size: 1.4vh;
  font-weight: 900;
  color: #5a3210;
}
.day-counter .day-money {
  font-size: 1.3vh;
  font-weight: 900;
  color: #5a3210;
}
/* ── SCENE ── */
.scene {
  position: absolute;
  top: 8%;
  left: 0;
  right: 0;
  bottom: 22%;
  z-index: 1;
}
/* Warehouse (top-left of scene) */
.warehouse {
  position: absolute;
  top: 0%;
  left: 1%;
  width: 32%;
  cursor: pointer;
  transition: transform 0.12s;
}
.warehouse:active { transform: scale(0.95); }
.warehouse img { width: 100%; display: block; }
/* Market building (top-right) */
.market-building {
  position: absolute;
  top: 0%;
  right: 1%;
  width: 48%;
  cursor: pointer;
  transition: transform 0.12s;
}
.market-building:active { transform: scale(0.95); }
.market-building img { width: 100%; display: block; }
/* Feeder (left-center) */
.feeder-wrap {
  position: absolute;
  top: 36%;
  left: 1%;
  width: 22%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2%;
}
.feeder-top-row {
  display: flex;
  align-items: center;
  gap: 4%;
  width: 100%;
  justify-content: center;
}
.btn-plus-feeder {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
.btn-plus-feeder img { width: 35%; min-width: 18px; }
.feeder-timer {
  background: url('assets/img/frame 1.png') center / 100% 100% no-repeat;
  padding: 4% 8%;
  font-size: 1.5vh;
  font-weight: 900;
  color: #5a3210;
  white-space: nowrap;
}
.feeder-img {
  width: 75%;
  position: relative;
}
.feeder-img img { width: 100%; display: block; }
/* Food/hunger bar inside feeder */
.hunger-bar-track {
  position: absolute;
  left: 22%;
  top: 8%;
  width: 22%;
  height: 78%;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.hunger-bar-fill {
  width: 100%;
  height: 15%;
  background: linear-gradient(to top, #e63232, #f77);
  border-radius: 4px;
  transition: height 0.3s;
}
/* Chicken (center) */
.chicken-wrap {
  position: absolute;
  top: 52%;
  left: 38%;
  width: 22%;
  cursor: pointer;
  animation: chickBob 1.8s ease-in-out infinite;
}
.chicken-wrap img { width: 100%; display: block; }
@keyframes chickBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4%); }
}
/* Coop (right-center) */
.coop-wrap {
  position: absolute;
  top: 38%;
  right: 3%;
  width: 28%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.btn-plus-coop {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-bottom: 1%;
  margin-right: 0;
  align-self: flex-end;
}
.btn-plus-coop img { width: 5vw; max-width: 32px; }
.coop-wrap img.coop-img { width: 100%; display: block; }
/* ── BOTTOM SECTION ── */
.bottom-section {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}
/* Hay / nest area */
.hay-area {
  width: 100%;
  aspect-ratio: 1079/208;
  background: url('assets/img/roost.png') center / 100% 100% no-repeat;
}
/* Bottom nav bar */
.nav-bar {
  background: url('assets/img/background of bottom.png') center / 100% 100% no-repeat;
  width: 100%;
  aspect-ratio: 1079/208;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 2% 3%;
  gap: 2%;
}
.nav-btn {
  flex: 1;
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, filter 0.1s;
}
.nav-btn:active {
  transform: scale(0.93);
  filter: brightness(0.85);
}
.nav-btn img {
  width: 100%;
  max-width: 130px;
  display: block;
}
.full-frame {
  /* overflow: visible; */
  padding: 4% 8%;
  display: flex;
  align-items: center;
  gap: 12%;
  border: 1px solid red;
}
.frame-1 {
  position: relative;
}
.frame-2{
  display: flex;
  align-items: center;
  gap: 6%;

}
.frame-bg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2); /* увеличил — вылезет */
  z-index: -1; /* чтобы было под контентом */
  pointer-events: none;
  width: 120px;
  
}
.frame-bg2 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2); /* увеличил — вылезет */
  z-index: -1; /* чтобы было под контентом */
  pointer-events: none;
  width: 120px;
  
}
  </style>
</head>
<body>
  <div id="game">
    <div class="bg"></div>


    <div class="top-bar">
           
          <div class="feed-counter">
                <img class="feed-icon" src="assets/img/food.png" alt="bags" />
                <span class="feed-num">01</span>
          </div>
          <div class="center-stats">
                <!-- <button class="btn-add-chicken" id="btnAddChicken" title="Добавить курицу">
                  <img src="assets/img/plus.png" alt="+" />
                </button> -->
              <div class="full-frame">
                  <div class="frame-1">
                    <img src="/assets/img/frame 1.png" alt="Frame 1" class="frame-bg">
                      <div class="stat-pill">
                          <img src="assets/img/rooster.png" alt="chicken" />
                          <span id="chickenCount">2</span>
                      </div>
                  </div>

                  <div class="frame-2">
                    <img src="/assets/img/frame 2.png" alt="Frame 2" class="frame-bg2">
                      <div class="stat-pill">
                          <img src="assets/img/chicken.png" alt="rooster" />
                          <span id="roosterCount">1</span>
                      </div>
                      <div class="stat-pill">
                          <img src="assets/img/egg.png" alt="egg" />
                          <span id="eggCount">10</span>
                      </div>
                  </div>
              </div>
          </div>
          <div class="day-counter">
              <span class="day-label">1 День</span>
              <span class="day-money">000$</span>
          </div>
    </div>

    <!-- SCENE  -->
    <div class="scene">
       <!-- Warehouse (shed with bags)  -->
      <div class="warehouse" id="warehouseBtn" title="Склад">
        <img src="assets/img/warehouse.png" alt="Склад" />
      </div>

       <!-- Market building  -->
      <div class="market-building" id="marketBuildingBtn" title="Рынок">
        <img src="assets/img/market.png" alt="Рынок" />
      </div>

      <!-- Feeder with timer  -->
      <div class="feeder-wrap">
        <div class="feeder-img">
          <img src="assets/img/feeder.png" alt="Кормушка" />  
        </div>
      </div>

      <!-- Chicken -->
      <div class="chicken-wrap" id="chickenBtn" title="Курица">
        <img src="assets/img/chicken (1).png" alt="Курица" />
      </div>

      <!-- Coop -->
      <div class="coop-wrap">
        <button class="btn-plus-coop" id="btnAddCoop" title="Добавить курятник">
          <img src="assets/img/plus.png" alt="+" />
        </button>
        <img class="coop-img" src="assets/img/coop.png" alt="Курятник" />
      </div>
    </div>

   <!-- BOTTOM -->
    <div class="bottom-section">
      <div class="hay-area"></div>
      <nav class="nav-bar">
        <button class="nav-btn" id="btnMarket" title="Рынок">
          <img src="assets/img/button market.png" alt="РЫНОК" />
        </button>
        <button class="nav-btn" id="btnLeaders" title="Лидеры">
          <img src="assets/img/button leaders.png" alt="ЛИДЕРЫ" />
        </button>
        <button class="nav-btn" id="btnSettings" title="Настройки">
          <img src="assets/img/button settings.png" alt="НАСТРОЙКИ" />
        </button>
      </nav>
    </div>
  </div>

  <script>
    // ── NAV BUTTONS ──
    document.getElementById('btnMarket').addEventListener('click', () => {
      console.log('play'); // market = play screen
    });
    document.getElementById('btnLeaders').addEventListener('click', () => {
      console.log('liders');
    });
    document.getElementById('btnSettings').addEventListener('click', () => {
      console.log('settings');
    });

    // ── SCENE BUTTONS ──
    document.getElementById('btnAddChicken').addEventListener('click', () => {
      const count = document.getElementById('chickenCount');
      count.textContent = parseInt(count.textContent) + 1;
      console.log('add chicken');
    });

    document.getElementById('chickenBtn').addEventListener('click', () => {
      const eggs = document.getElementById('eggCount');
      eggs.textContent = parseInt(eggs.textContent) + 1;
      console.log('chicken clicked, egg collected');
    });

    document.getElementById('btnAddCoop').addEventListener('click', () => {
      console.log('add coop');
    });

    document.getElementById('warehouseBtn').addEventListener('click', () => {
      console.log('warehouse opened');
    });

    document.getElementById('marketBuildingBtn').addEventListener('click', () => {
      console.log('play'); // market building also opens market
    });
  </script>
</body>
</html>
