<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- <link rel="stylesheet" href="/css/main.css"> -->
   <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Chicken Farm</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
:root{
  --main-border: 1px solid red;
}
html, body {
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: visible;
  font-family: 'Lato', sans-serif;
  
}
/* ── Main game container (9:16) ── */
#game {
  position: relative;
  aspect-ratio: 9 / 16;
  height: 100vh;
  max-height: 100vh;
  max-width: calc(100vh * 9 / 16);
  overflow: visible;
  user-select: none;
}
/* ── Background ── */
.bg {
  position: absolute;
  inset: 0;
  background: url('assets/img/background.png') center / cover no-repeat;
  z-index: 0;
  border-radius: 15px;
}
/* ── TOP BAR ── */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 2% 3%;
  /* border: var(--main-border); */
}
/* Bag of feed counter (top-left) */
.feed-counter {
  background: url('assets/img/background of food.png') center / 100% 100% no-repeat;
  width: 18%;
  aspect-ratio: 174/103;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6%;
}
.feed-counter img.feed-icon {
  width: 35%;
}
.feed-counter .feed-num {
  font-size: 2vh;
  color: #000000;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  font-weight: 700;
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
}
/* Center cluster: +, chickens, rooster, egg */

/* Day counter (top-right) */
.day-counter {
  background: url('assets/img/background of day.png') center / 100% 100% no-repeat;
  width: 18%;
  aspect-ratio: 174/103;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.1;
}
.day-counter .day-label {
  font-size: 1.5vh;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  font-weight: 700;
  color: #000;
}
.day-counter .day-money {
  font-size: 1.5vh;
  font-weight: 700;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  color: #000;
}
/* ── SCENE ── */
.scene {
  position: absolute;
  top: 8%;
  left: 0;
  right: 0;
  bottom: 22%;
  z-index: 1;
  
}
/* Warehouse (top-left of scene) */
.warehouse {
  position: absolute;
  top: 24%;
  left: 0%;
  width: 35%;
  cursor: pointer;
  transition: transform 0.12s;
}
.warehouse img { width: 100%; display: block; }
/* Market building (top-right) */
.market-building {
  position: absolute;
  top: 9%;
  right: 0%;
  width: 50%;
  cursor: pointer;
  transition: transform 0.12s;
}
.market-building img { width: 100%; display: block; }
/* Feeder (left-center) */
.feeder-wrap {
  position: absolute;
  top: 56%;
  left: -2%;
  width: 38%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2%;
}
.feeder-top-row {
  display: flex;
  align-items: center;
  gap: 4%;
  width: 100%;
  justify-content: center;
}
.btn-plus-feeder {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
.btn-plus-feeder img { width: 35%; min-width: 18px; }
.feeder-timer {
  background: url('assets/img/frame 1.png') center / 100% 100% no-repeat;
  padding: 4% 8%;
  font-size: 1.5vh;
  font-weight: 900;
  color: #5a3210;
  white-space: nowrap;
}
.feeder-img {
  width: 75%;
  position: relative;
}
.feeder-img img { width: 100%; display: block; }
/* Food/hunger bar inside feeder */
.hunger-bar-track {
  position: absolute;
  left: 22%;
  top: 8%;
  width: 22%;
  height: 78%;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.hunger-bar-fill {
  width: 100%;
  height: 15%;
  background: linear-gradient(to top, #e63232, #f77);
  border-radius: 4px;
  transition: height 0.3s;
}
/* Chicken (center) */
.chicken-wrap {
  position: absolute;
  top: 70%;
  left: 46%;
  width: 18%;
  cursor: pointer;
  animation: chickBob 1.8s ease-in-out infinite;
}
.chicken-wrap img { width: 100%; display: block; }

/* Coop (right-center) */
.coop-wrap {
  position: absolute;
  top: 49%;
  right: 0%;
  width: 23%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.btn-plus-coop img { width: 5vw; max-width: 32px; }
.coop-wrap img.coop-img { width: 100%; display: block; }
/* ── BOTTOM SECTION ── */
.roost-wrap{
  position: absolute;
  top: 101%;
  right: 0%;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.roost-img{
  width: 100%; 
  display: block; 
}

.panel {
  top: 70%;
  position: relative;
  width: 680px;
}

.roost {
  width: 100%;
  height: 100px;
  position: relative;
  z-index: 2;
  pointer-events: none;
}

.center-stats {
  display: flex;
  position: relative;
  width: 248px;
  height: 42px;
  top: 5px;

  /* border: var(--main-border); */
}
/* ── BOTTOM PANEL ── */
.bottom-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

/* Корыто с сеном — выезжает за верхний край панели */
.roost-bar {
  width: 100%;
  aspect-ratio: 2156 / 512;
  background: url('assets/img/roost.png') center / 100% 100% no-repeat;
  margin-bottom: -2%;  /* лёгкое перекрытие с bg_bottom */
  position: relative;
  z-index: 2;
  pointer-events: none;
}

/* Золотая полоска-фон */
.panel-bg {
  width: 100%;
  aspect-ratio: 1079 / 208;
  background: url('assets/img/background of bottom.png') center / 100% 100% no-repeat;
  height: 90%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5%;
  padding: 1% 3% 2%;
  position: relative;
  z-index: 1;
}

/* Кнопки */
.btn {
  position: relative;
  cursor: pointer;
  transition: transform 0.08s ease;
  flex-shrink: 0;
}
.btn:active { transform: scale(0.96) translateY(2px); }

/* market: 304×200 */
.btn-market  {bottom: 10px; width: 30%; aspect-ratio: 304 / 200;}
/* leaders: 304×202 */
.btn-leaders {bottom: 10px; width: 30%; aspect-ratio: 304 / 202; }
/* settings: 353×199 — шире */
.btn-settings { bottom: 10px; width: 35%;  aspect-ratio: 353 / 199; }

.btn img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: fill;
}

.btn-label {
  position: absolute;
  bottom: 20%;
  color: white;            
  -webkit-text-stroke: 1px black;
  left: 0; right: 0;
  text-align: center;
  font-family: 'Luckiest Guy', sans-serif;
  font-size: 2.3vh;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.4);
  pointer-events: none;
  transform: scaleY(1.2);
}
/* ОБЩИЕ */
.left-block,
.middle-block,
.right-block {
  position: absolute;
  height: 42px;
  background: #fff;
  border: 2.9px solid #2b0b05; 
  box-shadow: inset 0px 3px 2px 1px rgba(0,0,0,0.27);
  
  
}
/* ЛЕВЫЙ */
.left-block {
  width: 198px;
  left: 15px;
  border-radius: 99px;
  z-index: 1;
}

/* ЦЕНТР */
.middle-block {
  width: 81px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 99px 0 0 99px;
  z-index: 2;
}

/* ПРАВЫЙ */
.right-block {
  width: 89px;
  right: 0;
  border-radius: 0 99px 99px 0;
  z-index: 1;
}
.day-line-money {
  border-top: 2px solid #2b0b05;
  width: 62%;

}
.plus-icon {
  z-index: 2;
  margin-top: 4px;
  width: 33px;
  height: 33px;
}
.mega-kur {
  width: 24px;
  margin-left: 20px; 
  margin-top:3px; 
}
.num-kur {
  display: inline-block;
  font-size: 2.5vh;
  font-weight: 400;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  color: #000;
  margin-left: 1px;
  height: auto;
  overflow: hidden;
}
.num-egg {
  display: inline-block;
  font-size: 2.5vh;
  font-weight: 400;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  color: #000;
  margin-left: 1px;
  height: auto;
  overflow: hidden;
} 
.egg{
  width: 26px;
  margin-left: 12px; 
  margin-top:3px;
}

  </style>
</head>
<body>
  <div id="game">
    <div class="bg"></div>


    <div class="top-bar">
           
          <div class="feed-counter">
                <img class="feed-icon" src="assets/img/food.png" alt="bags" />
                <span class="feed-num">01</span>
          </div>

          <div class="center-stats">
              <img class="plus-icon" src="/assets/img/plus.png" alt="">
              <div class="left-block"><img class="mega-kur" src="/assets/img/rooster.png" alt=""> <span class="num-kur">2</span></div>
              <div class="middle-block"><img class="mega-kur" src="/assets/img/chicken.png" alt=""> <span class="num-kur">1</span></div>
              <div class="right-block"><img class="egg" src="/assets/img/egg.png" alt=""> <span class="num-egg">10</span></div>
          </div>

          <div class="day-counter">
              <span class="day-label">1 День</span>
              <div class="day-line-money"></div>
              <span class="day-money">000$</span>
      </div>
    </div>

    <!-- SCENE  -->
    <div class="scene">
       <!-- Warehouse (shed with bags)  -->
      <div class="warehouse" id="warehouseBtn" title="Склад">
        <img src="assets/img/warehouse.png" alt="Склад" />
      </div>

       <!-- Market building  -->
      <div class="market-building" id="marketBuildingBtn" title="Рынок">
        <img src="assets/img/market.png" alt="Рынок" />
      </div>

      <!-- Feeder with timer  -->
      <div class="feeder-wrap">
        <div class="feeder-img">
          <img src="assets/img/feeder.png" alt="Кормушка" />  
        </div>
      </div>

      <!-- Chicken -->
      <div class="chicken-wrap" id="chickenBtn" title="Курица">
        <img src="assets/img/chicken (1).png" alt="Курица" />
      </div>

      <!-- Coop -->
      <div class="coop-wrap">
        <img class="coop-img" src="assets/img/coop.png" alt="Курятник" />
      </div>
      <div class="roost-wrap">
        <img class="roost-img" src="assets/img/roost.png" alt="Курятник" />

      </div>
    </div>

    <div class="bottom-panel">
      <div class="panel-bg">
        <div class="btn btn-market" id="btnMarket">
          <img src="assets/img/background market.png" alt="Рынок">
          <span class="btn-label">РЫНОК</span>
        </div>
        <div class="btn btn-leaders" id="btnLeaders">
          <img src="assets/img/background leaders.png" alt="Лидеры">
          <span class="btn-label">ЛИДЕРЫ</span>
        </div>
        <div class="btn btn-settings" id="btnSettings">
          <img src="assets/img/background settings.png" alt="Настройки">
          <span class="btn-label">НАСТРОЙКИ</span>
        </div>
      </div>
    </div>
  </div>

  <script>                                  
    // ── NAV BUTTONS ──
    document.getElementById('btnMarket').addEventListener('click', () => {
      console.log('play'); // market = play screen
    });
    document.getElementById('btnLeaders').addEventListener('click', () => {
      console.log('liders');
    });
    document.getElementById('btnSettings').addEventListener('click', () => {
      console.log('settings');
    });

    // ── SCENE BUTTONS ──
    document.getElementById('btnAddChicken').addEventListener('click', () => {
      const count = document.getElementById('chickenCount');
      count.textContent = parseInt(count.textContent) + 1;
      console.log('add chicken');
    });

    document.getElementById('chickenBtn').addEventListener('click', () => {
      const eggs = document.getElementById('eggCount');
      eggs.textContent = parseInt(eggs.textContent) + 1;
      console.log('chicken clicked, egg collected');
    });

    document.getElementById('btnAddCoop').addEventListener('click', () => {
      console.log('add coop');
    });

    document.getElementById('warehouseBtn').addEventListener('click', () => {
      console.log('warehouse opened');
    });

    document.getElementById('marketBuildingBtn').addEventListener('click', () => {
      console.log('play'); // market building also opens market
    });
  </script>
  <!-- <div style="width: 500px; border-top:2px solid #ff0000;position: absolute;margin-top: -855px;"></div> -->
</body>
</html>
