<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- <link rel="stylesheet" href="/css/main.css"> -->
   <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Chicken Farm</title>
  <style>
:root{
  --main-border: 1px solid red;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: visible;
  font-family: 'Lato', sans-serif;
}

#game {
  position: relative;
  aspect-ratio: 9 / 16;
  height: 100vh;
  max-height: 100vh;
  max-width: calc(100vh * 9 / 16);
  overflow: visible;
  user-select: none;
}

.bg {
  position: absolute;
  inset: 0;
  background: url('assets/img/background.png') center / cover no-repeat;
  z-index: 0;
}
.dark-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 3;
}

.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 2% 3%;
}

.feed-counter {
  background: url('assets/img/background of food.png') center / 100% 100% no-repeat;
  width: 18%;
  aspect-ratio: 174 / 103;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6%;
}

.feed-counter img.feed-icon {
  width: 35%;
}

.feed-counter .feed-num {
  font-size: 2vh;
  color: #000;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  font-weight: 700;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
}

.center-stats {
  display: flex;
  position: relative;
  width: 248px;
  height: 42px;
}

.day-counter {
  background: url('assets/img/background of day.png') center / 100% 100% no-repeat;
  width: 18%;
  aspect-ratio: 174 / 103;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.1;
}

.day-counter .day-label {
  font-size: 1.5vh;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  font-weight: 700;
  color: #000;
}

.day-counter .day-money {
  font-size: 1.5vh;
  font-weight: 700;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  color: #000;
}

.bottom-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

.panel-bg {
  width: 100%;
  aspect-ratio: 1079 / 208;
  background: url('assets/img/background of bottom.png') center / 100% 100% no-repeat;
  height: 90%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5%;
  padding: 1% 3% 2%;
  position: relative;
  z-index: 1;
}

.btn {
  position: relative;
  cursor: pointer;
  transition: transform 0.08s ease;
  flex-shrink: 0;
}

.btn:active {
  transform: scale(0.96) translateY(2px);
}

.btn-market {
  bottom: 10px;
  width: 30%;
  aspect-ratio: 304 / 200;
}

.btn-leaders {
  bottom: 10px;
  width: 30%;
  aspect-ratio: 304 / 202;
}

.btn-settings {
  bottom: 10px;
  width: 35%;
  aspect-ratio: 353 / 199;
}

.btn img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: fill;
}

.btn-label {
  position: absolute;
  bottom: 20%;
  color: white;
  -webkit-text-stroke: 1px black;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'Luckiest Guy', sans-serif;
  font-size: 2.3vh;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-shadow:
    1px 1px 0 rgba(0, 0, 0, 0.5),
    0 2px 4px rgba(0, 0, 0, 0.4);
  pointer-events: none;
  transform: scaleY(1.2);
}





/* Top-Panel */
.left-block,
.middle-block,
.right-block {
  position: absolute;
  height: 42px;
  background: #fff;
  border: 2.9px solid #2b0b05;
  box-shadow: inset 0px 3px 2px 1px rgba(0, 0, 0, 0.27);
}

.left-block {
  width: 198px;
  left: 15px;
  border-radius: 99px;
  z-index: 1;
}

.middle-block {
  width: 81px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 99px 0 0 99px;
  z-index: 2;
}

.right-block {
  width: 89px;
  right: 0;
  border-radius: 0 99px 99px 0;
  z-index: 1;
}
.day-line-money {
  border-top: 2px solid #2b0b05;
  width: 62%;
}
.plus-icon {
  z-index: 2;
  margin-top: 4px;
  width: 33px;
  height: 33px;
}
.mega-kur {
  width: 24px;
  margin-left: 20px;
  margin-top: 3px;
}
.num-kur,
.num-egg {
  display: inline-block;
  font-size: 2.5vh;
  font-weight: 400;
  font-family: "Futura PT", "Century Gothic", sans-serif;
  color: #000;
  margin-left: 1px;
  overflow: hidden;
}
.egg {
  width: 26px;
  margin-left: 12px;
  margin-top: 3px;
}
.market-panel{
    position: absolute;
    top:6%;
    z-index: 4;
    border: var(--main-border);
    justify-content: center;
    justify-items: center;
}
.market-panel img{
    width: 100%;
    height: 90%;
    object-fit: cover;
}
.market-bg{
    position: absolute;
    inset: 0;
    top: 150px;
    left: 28px;
    width: 90%;
    height: 78%;
    background: #FBE8C6;
    z-index: -1;
    border: var(--main-border);
}
.product{
    position: absolute;
    top: 150px;
    left: 28px;
    width: 90%;
    height: 78%;
    display: flex;
    gap: 10px;
    border: 2px solid red;
}
  </style>
</head>
<body>
  <div id="game">
    <div class="bg"></div>
    <div class="dark-overlay"></div>

    <div class="top-bar">
           
          <div class="feed-counter">
                <img class="feed-icon" src="assets/img/food.png" alt="bags" />
                <span class="feed-num">01</span>
          </div>

          <div class="center-stats">
              <img class="plus-icon" src="/assets/img/plus.png" alt="">
              <div class="left-block"><img class="mega-kur" src="/assets/img/rooster.png" alt=""> <span class="num-kur">2</span></div>
              <div class="middle-block"><img class="mega-kur" src="/assets/img/chicken.png" alt=""> <span class="num-kur">1</span></div>
              <div class="right-block"><img class="egg" src="/assets/img/egg.png" alt=""> <span class="num-egg">10</span></div>
          </div>

          <div class="day-counter">
              <span class="day-label">1 День</span>
              <div class="day-line-money"></div>
              <span class="day-money">000$</span>
      </div>
    </div>
    <div class="market-panel">
        <img class="market-img" src="/img/main.png" alt="">
        <div class="market-bg"></div>
        <div class="product">
            <div class="product-section-1">
                
            </div>
            <div class="product-section-2">
                
            </div>
        </div>
    </div>
    <div class="bottom-panel">
      <div class="panel-bg">
        <div class="btn btn-market" id="btnMarket">
          <img src="assets/img/background market.png" alt="Рынок">
          <span class="btn-label">РЫНОК</span>
        </div>
        <div class="btn btn-leaders" id="btnLeaders">
          <img src="assets/img/background leaders.png" alt="Лидеры">
          <span class="btn-label">ЛИДЕРЫ</span>
        </div>
        <div class="btn btn-settings" id="btnSettings">
          <img src="assets/img/background settings.png" alt="Настройки">
          <span class="btn-label">НАСТРОЙКИ</span>
        </div>
      </div>
    </div>
  </div>


</body>
</html>
